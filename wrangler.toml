name = "mattgalvin-dot-dev"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "mattgalvin-dot-dev-db"
database_id = "9eb5cbf8-b5ac-47e1-a4a8-252cc98fc689"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "mattgalvin-dot-dev-bucket"

# Secrets (set via `wrangler secret put`):
#   ADMIN_PASSWORD    — your admin login password
#   SESSION_SECRET    — long random string for signing session cookies
#   DEPLOY_HOOK_URL   — Cloudflare Pages deploy hook URL (triggers rebuild on publish)
#
# For local dev, create a `.dev.vars` file:
#   ADMIN_PASSWORD=yourpassword
#   SESSION_SECRET=yoursecret
#   DEPLOY_HOOK_URL=https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/...
